name: Tauri Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: tauri-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tauri-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: quickpass-tauri-ubuntu
          - os: windows-2025
            artifact_name: quickpass-tauri-windows
          - os: macos-15
            artifact_name: quickpass-tauri-macos-arm64
          - os: macos-15-intel
            artifact_name: quickpass-tauri-macos-intel

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust toolchain
        id: toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          workspaces: ./src-tauri -> target

      - name: Import Apple certificate (macOS)
        if: startsWith(matrix.os, 'macos-')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ] || [ -z "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "::error::Missing one or more required macOS signing secrets (APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, KEYCHAIN_PASSWORD)."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_ID="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep 'Developer ID Application' | head -n 1 | awk -F'\"' '{print $2}')"
          if [ -z "$CERT_ID" ]; then
            echo "::error::No 'Developer ID Application' signing identity found after importing certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "Using signing identity: $CERT_ID"

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Run JavaScript lint
        run: npm run lint:js

      - name: Run Rust static checks
        shell: bash
        run: |
          npm run prep:tauri:dist
          rustup run "${{ steps.toolchain.outputs.name }}" cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          rustup run "${{ steps.toolchain.outputs.name }}" cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run test suite
        run: npm run test:all

      - name: Build Tauri bundle (macOS signed + notarized)
        if: startsWith(matrix.os, 'macos-')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri:build

      - name: Build Tauri bundle (non-macOS)
        if: ${{ !startsWith(matrix.os, 'macos-') }}
        run: npm run tauri:build

      - name: Upload per-platform artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.appimage
          if-no-files-found: error

  publish-release:
    needs: tauri-build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-artifacts

      - name: List release artifacts
        run: find release-artifacts -type f | sort

      - name: Collect final release assets
        id: collect_assets
        shell: bash
        run: |
          set -euo pipefail

          ASSET_LIST_FILE="$(mktemp)"
          find release-artifacts -type f \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.appimage' \) \
            | sort > "$ASSET_LIST_FILE"

          if [ ! -s "$ASSET_LIST_FILE" ]; then
            echo "::error::No distributable assets found in release-artifacts"
            exit 1
          fi

          DUPES="$(awk -F/ '{print $NF}' "$ASSET_LIST_FILE" | sort | uniq -d)"
          if [ -n "$DUPES" ]; then
            echo "::error::Duplicate asset filenames detected (would overwrite on release upload):"
            printf '%s\n' "$DUPES" | sed 's/^/  - /'
            exit 1
          fi

          {
            echo "files<<EOF"
            cat "$ASSET_LIST_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Assets selected for release:"
          sed 's/^/  - /' "$ASSET_LIST_FILE"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.3.3
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          overwrite_files: false
          fail_on_unmatched_files: true
          files: ${{ steps.collect_assets.outputs.files }}
