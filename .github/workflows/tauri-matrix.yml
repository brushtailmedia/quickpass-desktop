name: Tauri Matrix Build

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tauri-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tauri-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: quickpass-tauri-ubuntu
          - os: windows-2025
            artifact_name: quickpass-tauri-windows
          - os: macos-15
            artifact_name: quickpass-tauri-macos-arm64
          - os: macos-15-intel
            artifact_name: quickpass-tauri-macos-intel

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node from .nvmrc
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Rust toolchain
        id: toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Run JavaScript lint
        run: npm run lint:js

      - name: Run Rust static checks
        shell: bash
        run: |
          npm run prep:tauri:dist
          rustup run "${{ steps.toolchain.outputs.name }}" cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          rustup run "${{ steps.toolchain.outputs.name }}" cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run test suite
        run: npm run test:all

      - name: Build Tauri bundle
        run: npm run tauri:build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.appimage
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.sig
          if-no-files-found: error
